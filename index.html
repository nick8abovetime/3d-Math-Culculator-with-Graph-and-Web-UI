<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Math Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
</head>
<body>
    <div class="container">
        <h1>3D Math Calculator</h1>
        <div class="calculator">
            <div class="input-group">
                <label for="expression">Enter Expression</label>
                <input type="text" id="expression" placeholder="e.g., 2+2, sqrt(16), sin(pi/2)">
            </div>
            <button id="calculate-btn">Calculate</button>
            <div class="result">
                <label>Result</label>
                <output id="result-output">-</output>
            </div>
            <div class="error" id="error-message"></div>
        </div>
        
        <div class="graph-section">
            <h2>2D Graphing</h2>
            <div class="graph-inputs">
                <div class="input-group">
                    <label for="graph-function">Function f(x)</label>
                    <input type="text" id="graph-function" placeholder="e.g., sin(x), x^2, sqrt(x)">
                </div>
                <div class="range-inputs">
                    <div class="input-group">
                        <label for="x-min">X Min</label>
                        <input type="number" id="x-min" value="-10" step="1">
                    </div>
                    <div class="input-group">
                        <label for="x-max">X Max</label>
                        <input type="number" id="x-max" value="10" step="1">
                    </div>
                </div>
                <button id="graph-btn">Graph</button>
            </div>
            <canvas id="graph-canvas" width="600" height="400"></canvas>
            <div class="error" id="graph-error"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
