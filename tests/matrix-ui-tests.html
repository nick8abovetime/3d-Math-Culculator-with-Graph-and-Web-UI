<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix UI Tests</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
      background: #f5f5f5;
    }
    h1 { color: #333; }
    .test {
      margin: 10px 0;
      padding: 12px 16px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 14px;
    }
    .pass { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
    .fail { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
    #summary {
      margin-top: 20px;
      padding: 20px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 4px;
    }
    #summary.success { background: #d4edda; color: #155724; }
    #summary.failure { background: #f8d7da; color: #721c24; }
    .loading { color: #666; font-style: italic; }
  </style>
</head>
<body>
  <h1>Matrix UI Tests</h1>
  <div id="loading" class="loading">Loading application...</div>
  <div id="results" style="display: none;"></div>
  <div id="summary" style="display: none;"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
  <script src="../script.js"></script>
  <script src="matrix-ui.test.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('loading').style.display = 'none';

      const matrixTab = document.querySelector('.mode-tab[data-mode="matrix"]');
      if (matrixTab) {
        matrixTab.click();
      }

      setTimeout(function() {
        const testResults = window.matrixUITests.runTests();
        const resultsDiv = document.getElementById('results');
        const summaryDiv = document.getElementById('summary');

        resultsDiv.style.display = 'block';
        summaryDiv.style.display = 'block';

        testResults.results.forEach(function(result) {
          const div = document.createElement('div');
          div.className = 'test ' + (result.passed ? 'pass' : 'fail');
          div.textContent = (result.passed ? '✓ PASS' : '✗ FAIL') + ': ' + result.name + (result.error ? ' - ' + result.error : '');
          resultsDiv.appendChild(div);
        });

        summaryDiv.textContent = 'Results: ' + testResults.passed + ' passed, ' + testResults.failed + ' failed';
        if (testResults.failed === 0) {
          summaryDiv.className = 'success';
        } else {
          summaryDiv.className = 'failure';
        }
      }, 500);
    });
  </script>
</body>
</html>
